slug: mysql
name: MySQL
description: MySQL-compatible relational database.
category: database
docs_url: https://dev.mysql.com/doc/
logo: mysql
image: mysql:8.4
internal_port: 3306
exposed: false
variables:
  MYSQL_DATABASE: app
  MYSQL_USER: porter
  MYSQL_PASSWORD: ${SERVICE_PASSWORD_MYSQL}
  MYSQL_ROOT_PASSWORD: ${SERVICE_PASSWORD_ROOT}
volumes:
  - name: data
    path: /var/lib/mysql
provides:
  DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@${SERVICE_HOST}:3306/${MYSQL_DATABASE}
healthcheck:
  command: mysqladmin ping -h 127.0.0.1 -u ${MYSQL_USER}
