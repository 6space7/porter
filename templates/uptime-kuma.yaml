slug: uptime-kuma
name: Uptime Kuma
description: Public HTTPS uptime monitoring dashboard.
category: monitoring
docs_url: https://github.com/louislam/uptime-kuma/wiki
logo: uptime-kuma
image: louislam/uptime-kuma:1
internal_port: 3001
exposed: true
variables: {}
volumes:
  - name: data
    path: /app/data
provides:
  SERVICE_URL: ${SERVICE_URL}
healthcheck:
  command: node extra/healthcheck.js
