name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          archive="porter-${GOOS}-${GOARCH}.tar.gz"
          rm -rf dist/release
          mkdir -p dist/release
          go build -o dist/release/porter ./cmd/server
          cp install.sh uninstall.sh README.md ARCHITECTURE.md DECISIONS.md dist/release/
          tar -C dist/release -czf "${archive}" porter install.sh uninstall.sh README.md ARCHITECTURE.md DECISIONS.md

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: porter-${{ matrix.goos }}-${{ matrix.goarch }}
          path: porter-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/artifacts/porter-*.tar.gz
